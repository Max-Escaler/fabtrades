# Codemagic CI for FAB Trades (Flutter iOS).
# Flutter project lives at mobile/app — see working_directory below.
#
# Before the first signed upload:
# 1. Create the App Store Connect app record (Apps → + → New App) for bundle ID
#    com.fabtrades.app. That creates the app shell — no binary required yet.
# 2. Upload App Store Connect API key in Codemagic (Team integrations → Developer Portal).
# 3. Add Apple Distribution cert + App Store profile (Code signing identities).
# 4. Match integrations.app_store_connect to the exact API key name in the Codemagic UI.
#
workflows:
  ios-unsigned:
    name: iOS unsigned (debug)
    working_directory: mobile/app
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS debug without code signing
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/**/*.app
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: iOS TestFlight
    working_directory: mobile/app
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      # Must match the name you give the key in Codemagic → Team integrations → Developer Portal
      app_store_connect: codemagickey

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fabtrades.app
      vars:
        # App Store Connect → App Information → Apple ID
        APP_STORE_APPLE_ID: "6794308687"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          # After the first TestFlight upload, this auto-increments. Before that,
          # it falls back so we stay above pubspec's current +4.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 4)
          NEW_BUILD=$((LATEST + 1))
          echo "Using build number: $NEW_BUILD"
          echo "NEW_BUILD=$NEW_BUILD" >> "$CM_ENV"

      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --build-number="$NEW_BUILD" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        # Upload IPA only; turn on TestFlight group submission after first success.
        submit_to_testflight: false
        submit_to_app_store: false
        # After Internal Testing group exists in App Store Connect:
        # submit_to_testflight: true
        # beta_groups:
        #   - Internal testers
