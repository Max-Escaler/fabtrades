name: Release Android (Play Closed Testing)

on:
  workflow_dispatch:
    inputs:
      track:
        description: >
          Play Console track name. Built-in tracks: internal, alpha, beta.
          Custom closed tracks use the exact name shown in Play Console
          (Testing → Closed testing).
        required: true
        default: alpha
        type: string
      status:
        description: Release status on the track
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
      build_name:
        description: Optional versionName override (e.g. 1.0.2). Leave blank to use pubspec.yaml.
        required: false
        type: string
      build_number:
        description: >
          Optional versionCode override. Leave blank to auto-increment from the
          highest versionCode already uploaded to Play (recommended).
        required: false
        type: string

concurrency:
  group: release-android-closed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          mkdir -p mobile/app/android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/app/android/app/upload-keystore.jks

      - name: Write key.properties
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing ANDROID_KEYSTORE_PASSWORD and/or ANDROID_KEY_PASSWORD secrets"
            exit 1
          fi
          alias="${ANDROID_KEY_ALIAS:-upload}"
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$alias"
            printf 'storeFile=%s\n' 'app/upload-keystore.jks'
          } > mobile/app/android/key.properties

      # GitHub-hosted runners have ~7GB RAM; the repo gradle.properties requests 8G.
      - name: Cap Gradle memory for CI
        working-directory: ${{ github.workspace }}
        run: |
          sed -i 's/org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError/' \
            mobile/app/android/gradle.properties

      # Play rejects reuse of any previously uploaded versionCode. Query Play for the
      # max across bundles/APKs and use max+1 unless a manual override is provided.
      - name: Resolve version code
        id: version
        working-directory: ${{ github.workspace }}
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: fabtrades.myapp
          BUILD_NUMBER_OVERRIDE: ${{ inputs.build_number }}
        run: |
          if [ -n "$BUILD_NUMBER_OVERRIDE" ]; then
            echo "version_code=$BUILD_NUMBER_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "Using manual versionCode override: $BUILD_NUMBER_OVERRIDE"
            exit 0
          fi

          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

          python3 -m pip install --quiet google-api-python-client google-auth
          python3 <<'PY'
          import json
          import os

          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          package = os.environ["PACKAGE_NAME"]
          info = json.loads(os.environ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"])
          creds = service_account.Credentials.from_service_account_info(
              info,
              scopes=["https://www.googleapis.com/auth/androidpublisher"],
          )
          service = build(
              "androidpublisher", "v3", credentials=creds, cache_discovery=False
          )
          edit_id = service.edits().insert(packageName=package, body={}).execute()["id"]
          try:
              bundles = (
                  service.edits()
                  .bundles()
                  .list(packageName=package, editId=edit_id)
                  .execute()
              )
              apks = (
                  service.edits()
                  .apks()
                  .list(packageName=package, editId=edit_id)
                  .execute()
              )
              codes = [b["versionCode"] for b in bundles.get("bundles", [])]
              codes += [a["versionCode"] for a in apks.get("apks", [])]
              next_code = (max(codes) if codes else 0) + 1
          finally:
              service.edits().delete(packageName=package, editId=edit_id).execute()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version_code={next_code}\n")
          print(f"Auto-incremented versionCode from Play: {next_code}")
          PY

      - name: Build app bundle
        env:
          BUILD_NAME: ${{ inputs.build_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.version_code }}
        run: |
          if [ -z "$BUILD_NUMBER" ]; then
            echo "Resolved versionCode is empty"
            exit 1
          fi
          args=(build appbundle --release --build-number="$BUILD_NUMBER")
          if [ -n "$BUILD_NAME" ]; then
            args+=(--build-name="$BUILD_NAME")
          fi
          echo "Building with versionCode=$BUILD_NUMBER${BUILD_NAME:+ versionName=$BUILD_NAME}"
          flutter "${args[@]}"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fabtrades.myapp
          releaseFiles: mobile/app/build/app/outputs/bundle/release/app-release.aab
          tracks: ${{ inputs.track }}
          status: ${{ inputs.status }}
